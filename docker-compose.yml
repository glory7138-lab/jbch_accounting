version: '3.8'

services:
  backend:
    build: ./backend
    container_name: accounting_backend
    restart: always
    ports:
      - "8500:8500"
    volumes:
      # 🔄 백엔드 소스 코드 실시간 자동 반영 규칙
      - ./backend:/app
      # 💾 진짜 DB 파일 위치 강제 고정
      - ./backend/accounting.db:/app/accounting.db
    environment:
      - OPENAI_MODEL=gpt-4.1-nano
      - ALLOWED_ORIGINS=http://localhost:3010
      # 🛡️ 백엔드가 크래시(Crash) 나지 않도록 안전하게 빈 폴더 지정
      - SAMPLE_DATA_DIR=/tmp
      - DATABASE_URL=sqlite:///accounting.db
      - DB_PATH=/app/accounting.db

  frontend:
    build: ./frontend
    container_name: accounting_frontend
    restart: always
    ports:
      - "3010:3000"
    volumes:
      # 🔄 프론트엔드 소스 코드 실시간 자동 반영 규칙 (Next.js 화면 수정 즉시 반영)
      - ./frontend:/app
      # 윈도우와 리눅스 간의 라이브러리 충돌 방지 치트키 규칙
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8500
    depends_on:
      - backend